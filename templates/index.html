<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="color-scheme" content="dark">
<title>Urnix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="app-shell">
  <!-- Ambient background -->
  <div class="bg-fx" aria-hidden="true">
    <div class="grid-layer"></div>
    <div class="glow glow-a"></div>
    <div class="glow glow-b"></div>
  </div>

  <!-- Empty / welcome state -->
  <section class="center-stage" id="centerStage">
    <h1 class="wordmark">URN<span>I</span>X</h1>
    <p class="tagline">How can Urnix help you today?</p>
  </section>

  <!-- Conversation -->
  <main class="chat-area" id="chatArea"></main>
  <div class="fade-bottom" aria-hidden="true"></div>

  <!-- Composer -->
  <footer class="bottom-zone">
    <div class="composer">
      <div class="attach-chip-row" id="chipRow"></div>

      <div class="input-bar">
        <div class="plus-wrap">
          <button class="plus-circle" id="plusBtn" aria-label="Attach">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1V13M1 7H13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
          <div class="attach-menu" id="attachMenu">
            <div class="attach-item" id="mediaItem">
              <span class="attach-icon">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="none">
                  <rect x="2" y="4" width="16" height="12" rx="2.5" stroke="currentColor" stroke-width="1.6"/>
                  <circle cx="7" cy="9" r="1.6" fill="currentColor"/>
                  <path d="M4 14 L8.5 10 L11.5 12.5 L14 10.5 L16.5 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              Media
            </div>
          </div>
        </div>

        <input type="file" id="fileInput" accept="image/*" style="display:none" />
        <input class="ask-input" id="askInput" type="text" placeholder="Ask Urnix anything" autocomplete="off" />

        <button class="send-btn" id="sendBtn" aria-label="Send message">
          <svg width="15" height="15" viewBox="0 0 20 20" fill="none">
            <path d="M3 10 H16 M10 4 L16 10 L10 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <p class="disclaimer">
        <span class="disclaimer-prefix">Urnix can make mistakes.</span>
        <a class="disclaimer-link" href="{{ url_for('policies') }}">
          <span class="disclaimer-link-text">Check important information</span>
        </a>
      </p>
    </div>
  </footer>

</div>

<script>
  const input = document.getElementById('askInput');
  const sendBtn = document.getElementById('sendBtn');
  const chatArea = document.getElementById('chatArea');
  const centerStage = document.getElementById('centerStage');
  const plusWrap = document.querySelector('.plus-wrap');
  const plusBtn = document.getElementById('plusBtn');
  const attachMenu = document.getElementById('attachMenu');
  const mediaItem = document.getElementById('mediaItem');
  const fileInput = document.getElementById('fileInput');
  const chipRow = document.getElementById('chipRow');

  const botReplies = [
    "Got it — checking that for you now.",
    "Sure, give me a moment to pull that up.",
    "I can help with that. Let me look into it.",
    "Thanks for the details, one sec."
  ];

  let pendingImage = null;

  function addBubble({ text, imgSrc }, who) {
    const row = document.createElement('div');
    row.className = 'bubble-row ' + who;
    const bubble = document.createElement('div');
    bubble.className = 'bubble ' + who + (imgSrc ? ' has-img' : '');
    if (imgSrc) {
      const img = document.createElement('img');
      img.className = 'bubble-img';
      img.src = imgSrc;
      bubble.appendChild(img);
      if (text) {
        const cap = document.createElement('div');
        cap.className = 'img-caption';
        cap.textContent = text;
        bubble.appendChild(cap);
      }
    } else {
      bubble.textContent = text;
    }
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  function addThinkingBubble() {
    const row = document.createElement('div');
    row.className = 'bubble-row bot';
    const bubble = document.createElement('div');
    bubble.className = 'bubble bot thinking';
    const spinner = document.createElement('div');
    spinner.className = 'think-spinner';
    const text = document.createElement('span');
    text.className = 'think-text';
    text.textContent = 'Responding';
    bubble.appendChild(spinner);
    bubble.appendChild(text);
    row.appendChild(bubble);
    chatArea.appendChild(row);
    chatArea.scrollTop = chatArea.scrollHeight;
    return row;
  }

  function updateSendState() {
    const hasContent = input.value.trim().length > 0 || pendingImage;
    sendBtn.classList.toggle('active', hasContent);
  }

  function renderChip() {
    chipRow.innerHTML = '';
    if (!pendingImage) return;
    const chip = document.createElement('div');
    chip.className = 'attach-chip';
    const img = document.createElement('img');
    img.src = pendingImage.src;
    const name = document.createElement('span');
    name.className = 'attach-name';
    name.textContent = pendingImage.name;
    const remove = document.createElement('button');
    remove.className = 'attach-remove';
    remove.innerHTML = '&times;';
    remove.onclick = () => {
      pendingImage = null;
      renderChip();
      updateSendState();
    };
    chip.appendChild(img);
    chip.appendChild(name);
    chip.appendChild(remove);
    chipRow.appendChild(chip);
  }

  function closeMenu() {
    attachMenu.classList.remove('open');
    plusBtn.classList.remove('open');
  }

  function handleSend(prefill) {
    const text = (prefill !== undefined ? prefill : input.value).trim();
    if (!text && !pendingImage) return;

    if (!centerStage.classList.contains('hidden')) {
      centerStage.classList.add('hidden');
    }

    if (pendingImage) {
      addBubble({ text, imgSrc: pendingImage.src }, 'user');
    } else {
      addBubble({ text }, 'user');
    }

    input.value = '';
    pendingImage = null;
    renderChip();
    updateSendState();
    input.blur();

    const thinkingRow = addThinkingBubble();

    fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    })
      .then(res => res.json())
      .then(data => {
        thinkingRow.remove();
        addBubble({ text: data.reply }, 'bot');
      })
      .catch(() => {
        thinkingRow.remove();
        addBubble({ text: "Something went wrong. Please try again." }, 'bot');
      });
  }

  input.addEventListener('input', updateSendState);

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSend();
  });

  sendBtn.addEventListener('click', () => handleSend());

  plusBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const isOpen = attachMenu.classList.toggle('open');
    plusBtn.classList.toggle('open', isOpen);
  });

  mediaItem.addEventListener('click', (e) => {
    e.stopPropagation();
    fileInput.click();
    closeMenu();
  });

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      pendingImage = { src: reader.result, name: file.name };
      renderChip();
      updateSendState();
    };
    reader.readAsDataURL(file);
    fileInput.value = '';
  });

  document.addEventListener('click', (e) => {
    if (!plusWrap.contains(e.target)) closeMenu();
  });

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    });
  }
</script>

</body>
</html>
